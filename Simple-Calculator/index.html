<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-conatiner">
    <div class="resultDisplay">
      <p class="js-display css-display"></p>
    </div>
    
    <div class="container">
    <button onclick="
    updateCalculation('1');
    displayOnscreen();">
    1</button>
    <button onclick="
    updateCalculation('2');">
    2</button>
    <button onclick="
    updateCalculation('3');">
    3</button>
    <button onclick="
    updateCalculation(' + ');">
    +</button>

    <button onclick="
    updateCalculation('4');">
    4</button>
    <button onclick="
    updateCalculation('5');">
    5</button>
    <button onclick="
    updateCalculation('6');">
    6</button>
    <button onclick="
    updateCalculation(' - ');">
    -</button>

    <button onclick="
    updateCalculation('7');">
    7</button>
    <button onclick="
    updateCalculation('8');">
    8</button>
    <button onclick="
    updateCalculation('9')">
    9</button>
    <button onclick="
    updateCalculation(' * ')">
    *</button>
    
    <button onclick="
    updateCalculation('0')">
    0</button>
    <button onclick="
    updateCalculation('.')">
    .</button>
    <button class="eql" onclick="
    calculation= eval(calculation);
    //console.log(calculation);
    displayOnscreen();">
    =</button>
    <button onclick="
    updateCalculation(' / ')">
    /</button>
    </div>
    
    <button class="clr" onclick="
    calculation='';
    localStorage.setItem('calculation',calculation);//remembers to save calulation here too
    displayOnscreen();"> 
    clear</button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
