<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <p class="page-title">Rock Paper Scissors</p>
  <button class="move-btn" onclick="playGame('Rock');">
    <img class="move-icon" src="images/rock-emoji.png" alt="rock icon"></button>
  <button class="move-btn" onclick="playGame('Paper');">
    <img class="move-icon" src="images/paper-emoji.png" alt="paper icon"></button>
  <button class="move-btn" onclick="playGame('Scissors');">
    <img class="move-icon" src="images/scissors-emoji.png" alt="scissors icon"></button>
  <p class="js-result css-result"></p>
  <p class="js-moves"></p>
  <p class="js-score score"></p>
  <button class="reset-score-btn" onclick="
  score.wins=0;
  score.loses=0;
  score.ties=0;
  localStorage.removeItem('score');
  updateScore();">
    Reset Score</button> 
  <button class="auto-play-btn" onclick="autoPlay();">Auto Play</button>
  <script src="script.js"></script>
</body>
</html>
